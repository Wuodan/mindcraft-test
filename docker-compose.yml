services:
  minecraft:
    image: itzg/minecraft-server:java25
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.6"
      ONLINE_MODE: "FALSE"
      SERVER_PORT: "${MC_SERVER_PORT:-55916}"
      PLUGINS: "https://www.curseforge.com/api/v1/mods/31620/files/7460127/download"
      # SEED to spawn at a village (from https://beebom.com/best-minecraft-seeds/ -> 2. Three Villages and a Cherry Grove)
      SEED: "5348024562502568"
      SPAWN: "-34,122,-26"
    volumes:
      - minecraft-data:/data
      - ./minecraft-config/bukkit.yml:/data/bukkit.yml
    ports:
      - "${MC_SERVER_PORT:-55916}:${MC_SERVER_PORT:-55916}"
      - "${DYNMAP_HOST_PORT:-8123}:8123"
    stdin_open: true
    tty: true
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_FLASH_ATTENTION: "1"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: "${OLLAMA_MODELS:-embeddinggemma Sweaterdog/Andy-4:latest qwen2.5-coder:3b}"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -lc
      - |
        for i in 1 2 3 4 5; do
          ollama list >/dev/null 2>&1 && break
          sleep 2
        done
        for model in $${OLLAMA_MODELS}; do
          ollama show "$$model" >/dev/null 2>&1 || ollama pull "$$model"
        done

  bots:
    pull_policy: never
    build:
      context: ${MINDCRAFT_REPO:-https://github.com/mindcraft-bots/mindcraft.git}#${MINDCRAFT_REF:-develop}
      dockerfile: Dockerfile
    image: mindcraft-bot:local
    user: "${BOT_UID:-1000}:${BOT_GID:-1000}"
    depends_on:
      minecraft:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SETTINGS_JSON: |
        {
          "host": "minecraft",
          "port": ${MC_SERVER_PORT:-55916},
          "auto_open_ui": false,
          "profiles": [
            "./profiles/bot_1.json",
            "./profiles/bot_2.json"
          ],
          "init_message": "${INIT_MESSAGE:-Start autonomous goal mode: obtain and equip full diamond armor and one diamond sword while staying alive. Prioritize survival and sustainability: keep food available, avoid low-health risks, and maintain a safe base with storage. Suggested progression: basic tools -> iron tools/armor and shield -> diamond mining -> craft/equip full diamond kit. Only end the goal when full diamond armor is equipped and a diamond sword is ready.}",
          "chat_ingame": true,
          "allow_insecure_coding": true,
          "narrate_behavior": true,
          "chat_bot_messages": true,
          "log_all_prompts": true
        }
    volumes:
      - ./bots/bot_1:/app/bots/bot_1
      - ./bots/bot_2:/app/bots/bot_2
      - ./profiles/bot_1.json:/app/profiles/bot_1.json
      - ./profiles/bot_2.json:/app/profiles/bot_2.json
    ports:
      - "${MINDCRAFT_UI_PORT:-18080}:8080"

volumes:
  minecraft-data:
  ollama-data:
