services:
  minecraft:
    image: itzg/minecraft-server@sha256:cce41161e946a6a34ee6993b093bf3ed9a3942bd6b2fcf24d9d2797941884b4e
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.6"
      ONLINE_MODE: "FALSE"
      SERVER_PORT: "55916"
      PLUGINS: "https://www.curseforge.com/api/v1/mods/31620/files/7460127/download"
    volumes:
      - minecraft-data:/data
      - ./minecraft-config/bukkit.yml:/data/bukkit.yml
      - ./minecraft-config/ops.json:/data/ops.json
    ports:
      - "55916:55916"
      - "8123:8123"
    stdin_open: true
    tty: true
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -lc
      - |
        for i in 1 2 3 4 5; do
          ollama list >/dev/null 2>&1 && break
          sleep 2
        done
        ollama show qwen2.5-coder:7b >/dev/null 2>&1 || ollama pull qwen2.5-coder:7b

  bots:
    build:
      context: ${MINDCRAFT_REPO:-https://github.com/mindcraft-bots/mindcraft.git}#${MINDCRAFT_REF:-develop}
      dockerfile: Dockerfile
    image: mindcraft-bot:local
    depends_on:
      minecraft:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      SETTINGS_JSON: |
        {
          "host": "minecraft",
          "port": 55916,
          "auto_open_ui": false,
          "profiles": [
            "./profiles/bot_or_1.json",
            "./profiles/bot_or_2.json"
          ],
          "init_message": "Immediately start autonomous goal mode by calling !goal(...) for this objective: obtain and equip a full diamond armor set (diamond_helmet, diamond_chestplate, diamond_leggings, diamond_boots) and one diamond_sword for yourself as fast as possible while continuously managing your own survival and well-being (health, safety, food, and shelter as needed). You may choose any intermediate strategy, including storing items and subgoals. Keep working until complete. When complete, send exactly TASK_DONE_DIAMOND_KIT in chat, then call !endGoal.",
          "allow_insecure_coding": true,
          "chat_bot_messages": true,
          "log_all_prompts": true
        }
    volumes:
      - ./keys.json:/app/keys.json
      - ./bots/bot_or_1:/app/bots/bot_or_1
      - ./bots/bot_or_2:/app/bots/bot_or_2
      - ./profiles/bot_or_1.json:/app/profiles/bot_or_1.json
      - ./profiles/bot_or_2.json:/app/profiles/bot_or_2.json
    ports:
      - "8080:8080"

volumes:
  minecraft-data:
  ollama-data:
